<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Untitled Document</title>
<style>
    * {margin: 0; padding: 0;}
    @font-face {
        font-family: Candara;
        src: url("Candara.ttf");
    } h1 {
        text-align: center;
        font-weight: normal;
    } img {
        width: 100%;
        display: block;
        margin: 0 auto;
    } figcaption {
        font: italic 9pt/1.4em Candara;
    } form {
        width: 600px;
        min-height: 600px;
        padding: 24px;
        background: lightgray;
        margin: 36px auto;
        border: 1px solid limegreen;
        box-shadow: 2px 3px 6px limegreen;
        border-radius: 18px;
        font: 14pt/1.2em Candara;
    } fieldset {
        margin-top: 18px;
    } #personal input, #submit {
        width: 100%;
        height: 24px;
        margin-bottom: 12px;
	} input[type="text"] {
		width: 98%;
		font: 14pt/1.4em Candara;
		margin-top: 6px;
	} input[type="submit"] {
		width: 100px;
		height: 40px;
		background: lightgreen;
		margin: 6px auto;
		display: block;
		border-radius: 6px;
		border: 1px solid dimgray;
		font: 14pt/1.4em Candara;
	}
</style>
<script language="JavaScript">
    function toggle(source) {
        checkboxes = document.getElementsByName('foo');
        for(var checkbox in checkboxes)
        checkboxes[checkbox].checked = source.checked;
    }
</script>

</head>

<body>
    <img src="geralt-lens-430621_1280.jpg" />
    <figcaption>Photo by Gerd Altman from Pixabay</figcaption>
    <form action="https://formsubmit.co/santaj8@unlv.nevada.edu" method="post">
    <h1>Contact Us</h1>
	<label> First Name </label><br/>
	<input type="text"><br/>
	<label> Last Name </label><br/>
	<input type="text"><br/>
	<fieldset>
	<legend>Reason For Contacting Us</legend>
	<input type="Radio" name="service">
	<label>Photography</label><br/>
	<input type="Radio" name="service">
	<label>Illustration</label><br/>
	<input type="Radio" name="service">
	<label>Video Editing</label><br/>
	<input type="Radio" name="service">
	<label>UX/UI Design</label><br/>
	<input type="Radio" name="service">
	<label>Other</label>
	</fieldset>
	<fieldset>
	<legend>Operating System</legend>
	<input type="checkbox" onClick="toggle(this)">
	<label>Check/Uncheck All</label><br/>
	<input type="checkbox" name="foo">
	<label>MacOS</label><br/>
	<input type="checkbox" name="foo">
	<label>Windows</label><br/>
	<input type="checkbox" name="foo">
	<label>Linux</label><br/>
	<input type="checkbox" name="foo">
	<label>Other</label>
	</fieldset>
	<fieldset>
	<legend>Time Frame</legend>
	<select>
		<option>This Week</option>
		<option>This Month</option>
		<option>This Quarter</option>
		<option>Not Sure</option>
	</select>
	</fieldset>
	<label> Subject </label><br/>
	<input type="text"><br/>
	<label>Message</label><br/>
	<textarea rows="5" cols="72">
	</textarea>
	<input type="submit" />
    </form>
</body>
</html>
